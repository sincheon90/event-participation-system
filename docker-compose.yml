services:
  mysql:
    image: mysql:8.4
    container_name: event-participation-mysql

    environment:
      MYSQL_DATABASE: event_participation
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: